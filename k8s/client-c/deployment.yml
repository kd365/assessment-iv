apiVersion: apps/v1
kind: Deployment
metadata:
  name: legal-nlp-api
  namespace: client-c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legal-nlp-api
  template:
    metadata:
      labels:
        app: legal-nlp-api
    spec:
      containers:
        - name: legal-nlp-api
          image: ghcr.io/kd365/legal-nlp-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENDPOINT_NAME
              valueFrom:
                configMapKeyRef:
                  name: client-c-config
                  key: ENDPOINT_NAME
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: client-c-config
                  key: AWS_DEFAULT_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: client-c-aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: client-c-aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
