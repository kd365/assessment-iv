apiVersion: v1
kind: Service
metadata:
  name: credit-risk-api-svc
  namespace: client-a
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: credit-risk-api
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
