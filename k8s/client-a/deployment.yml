apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-risk-api
  namespace: client-a
  labels:
    app: credit-risk-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credit-risk-api
  template:
    metadata:
      labels:
        app: credit-risk-api
    spec:
      imagePullSecrets:
        - name: registry-secrets-client-a
      containers:
        - name: credit-risk-api
          image: ghcr.io/kd365/credit-risk-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials-client-a
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials-client-a
                  key: AWS_SECRET_ACCESS_KEY
            - name: ENDPOINT_NAME_V1
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: ENDPOINT_NAME_V1
            - name: ENDPOINT_NAME_V2
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: ENDPOINT_NAME_V2
            - name: TRAFFIC_WEIGHT_V1
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: TRAFFIC_WEIGHT_V1
            - name: MODEL_VERSION_V1
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: MODEL_VERSION_V1
            - name: MODEL_VERSION_V2
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: MODEL_VERSION_V2
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: client-a-config
                  key: AWS_DEFAULT_REGION
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
